<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NICU Fluids Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>NICU Fluids Calculator</h1>

  <div class="card">
    <h2>Patient Details</h2>

    <label>Weight (kg)*</label>
    <input type="number" id="weight" step="0.01">

    <label>Day of Life*</label>
    <input type="number" id="dol">

    <label>Total Fluid Target (ml/kg/day)*</label>
    <input type="number" id="targetFluid">
  </div>

  <div class="card">
    <h2>Feeding</h2>

    <label>Feeding Type*</label>
    <select id="feedingType">
      <option>Full Feeding</option>
      <option>Increment Feeding</option>
      <option>NBM</option>
    </select>

    <label>Milk Type*</label>
    <select id="milkType">
      <option>Standard Formula</option>
      <option>Mature Breastmilk</option>
      <option>Preterm Formula</option>
      <option>Preterm Breastmilk</option>
      <option>Cow Milk</option>
    </select>

    <label>Feed Volume (ml)</label>
    <input type="number" id="feedVol">

    <label>Feed Interval (hours)</label>
    <input type="number" id="feedInterval">
  </div>

  <div class="card" id="pnSection">

    <h2>PN</h2>

    <label>PN Type*</label>
    <select id="pnType">
      <option>Type A</option>
      <option>Type B</option>
      <option>Type C</option>
    </select>

    <label>Protein (g/kg/day)</label>
    <input type="number" id="proteinDose" step="0.1">

    <label>PN Rate (ml/hr)</label>
    <input type="number" id="pnRate" step="0.1">

    <h2>Lipid</h2>

    <label>Lipid Dose (g/kg/day)</label>
    <input type="number" id="lipidDose" step="0.1">

    <label>Lipid Rate (ml/hr)</label>
    <input type="number" id="lipidRate" step="0.1">

  </div>

  <div class="card" id="ivdSection">

    <h2>IVD</h2>

    <label>IVD Type*</label>
    <select id="ivdType">
      <option>1/5NS</option>
      <option>HS</option>
      <option>NS</option>
      <option>3% Saline</option>
      <option>HM</option>
      <option>No Drip</option>
    </select>

    <label>Dextrose (%)</label>
    <input type="number" id="dextrose">

    <label>IVD Rate (ml/hr)</label>
    <input type="number" id="ivdRate" step="0.1">

  </div>

  <button onclick="calculate()">Calculate</button>

  <div class="card output">

    <h2>Results</h2>

    <p id="totalFluidOut"></p>
    <p id="gdrOut"></p>
    <p id="caloriesOut"></p>
    <p id="proteinOut"></p>
    <p id="lipidOut"></p>

    <h3>Electrolytes</h3>

    <p id="naOut"></p>
    <p id="kOut"></p>
    <p id="clOut"></p>
    <p id="caOut"></p>
    <p id="phosOut"></p>
    <p id="mgOut"></p>
    <p id="acetateOut"></p>

    <p id="warning"></p>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
